services:
  postgres:
    image: postgres:17-alpine
    container_name: harmonix-mobile-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: harmonix_mobile
    ports:
      - "54329:5432"
    volumes:
      - harmonix_mobile_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d harmonix_mobile"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  harmonix_mobile_postgres:
